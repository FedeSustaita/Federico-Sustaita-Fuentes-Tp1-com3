<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>
<body>
    <header>

    </header>
<main class="content mt-5">

<h2 class="text-center mb-4">Formulario de Empleado</h2>

<div class="mb-3">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" class="form-control">
</div>

<div class="mb-3">
    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" class="form-control">
</div>

<div class="mb-3">
    <label for="dni">DNI</label>
    <input type="number" id="dni" class="form-control">
</div>

<div class="mb-3">
    <label for="direccion">Dirección</label>
    <input type="text" id="direccion" class="form-control">
</div>

<div class="mb-3">
    <label for="horas">Horas trabajadas</label>
    <input type="number" id="horas" class="form-control">
</div>

<div class="mb-4">
    <label for="precioHora">Pago por hora</label>
    <input type="number" id="precioHora" class="form-control">
</div>

<div class="text-center">
    <button onclick="agregarEmpleado()" class="btn btn-primary">
        Agregar Empleado
    </button>
</div>

<div id="salida" class="mt-4"></div>

</main>
    <footer>

    </footer>
    <script src="./app.js"></script>
</body>
</html>
