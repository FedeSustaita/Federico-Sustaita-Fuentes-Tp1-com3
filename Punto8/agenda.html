<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2 class="text-center mb-4">Agenda Telefónica</h2>

    <!-- FORM -->
    <div class="mb-3">
        <input type="text" id="nomyApe" class="form-control" placeholder="Nombre y Apellido">
    </div>

    <div class="mb-3">
        <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
    </div>

    <div class="mb-3">
        <input type="text" id="direccion" class="form-control" placeholder="Dirección">
    </div>

    <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="Email">
    </div>

    <button onclick="agregarContacto()" class="btn btn-primary mb-4">
        Agregar Contacto
    </button>

    <!-- TABLA -->
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

<script src="app.js"></script>
</body>
</html>
