<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>
<body>
    <header>

    </header>
<main class="content mt-5">

    <h2 class="text-center mb-4">Formulario de Vehículo</h2>
    <!-- Marca -->
    <div class="mb-3">
        <label for="marca">Marca</label>
        <input type="text" id="marca" class="form-control" placeholder="Ej: Toyota">
    </div>

    <!-- Modelo -->
    <div class=" mb-3">
        <label for="modelo">Modelo</label>
        <input type="text" id="modelo" class="form-control" placeholder="Ej: Corolla">
    </div>

    <!-- Año -->
    <div class="mb-3">
        <label for="anio">Año de fabricación</label>
        <input type="number" id="anio" class="form-control" min="1900" max="2026" step="1" placeholder="Ej: 2020">
    </div>

    <!-- Color -->
    <div class="mb-3">
        <label for="color">Color</label>
        <input type="text" id="color" class="form-control">
    </div>

    <!-- Estado -->
    <div class="mb-3">
        <label for="estado">Condición</label>
        <input type="text" id="estado" class="form-control" placeholder="Nuevo / Usado">
    </div>

    <!-- Precio -->
    <div class="mb-4">
        <label for="precio">Valor</label>
        <input type="number" id="precio" class="form-control">
    </div>

    <!-- Botón -->
    <div class="text-center">
        <button onclick="datos()" class="btn btn-success">
            Ver Información
        </button>
    </div>

    <!-- Resultado -->
    <div id="salida" class="mt-4"></div>

</main>
    <footer>

    </footer>
    <script src="./app.js"></script>
</body>
</html>
